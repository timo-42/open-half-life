name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            expected_os: Linux
            expected_arch: x86_64
            cmake_args: ""
          - os: windows-latest
            name: Windows x64
            expected_os: Windows
            expected_arch: x86_64
            cmake_args: ""
          - os: macos-15
            name: macOS Apple Silicon
            expected_os: macOS
            expected_arch: arm64
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=arm64
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Check repository policy
        run: cmake -P cmake/CheckRepository.cmake

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOHL_WARNINGS_AS_ERRORS=ON
          -DOHL_EXPECTED_OS=${{ matrix.expected_os }}
          -DOHL_EXPECTED_ARCH=${{ matrix.expected_arch }}
          ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
